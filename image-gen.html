<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUILEX AI — Image Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07070f;--surface:#0f0f1c;--surface2:#161625;--hover:#1c1c2e;
  --accent:#00d4ff;--accent2:#7b2fff;--green:#00ff88;--gold:#ffaa00;
  --text:#f0f0f8;--text2:#8888aa;--text3:#454560;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --radius:14px;
}
html{font-size:15px;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:rgba(7,7,15,0.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
.logo{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.top-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border2);background:transparent;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.top-btn:hover{background:var(--hover);color:var(--text);}

/* MAIN */
.container{max-width:560px;margin:0 auto;padding:24px 16px 100px;}

/* HERO */
.hero{text-align:center;margin-bottom:28px;}
.hero-title{font-family:'Orbitron',monospace;font-size:clamp(20px,5vw,28px);font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2),#ff2d6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.hero-sub{font-size:13px;color:var(--text2);}

/* PROMPT BOX */
.prompt-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:16px;margin-bottom:16px;transition:border .2s;}
.prompt-box:focus-within{border-color:rgba(0,212,255,0.35);}
.prompt-ta{width:100%;background:none;border:none;outline:none;font-size:14px;color:var(--text);line-height:1.6;resize:none;min-height:80px;font-family:'Inter',sans-serif;}
.prompt-ta::placeholder{color:var(--text3);}
.prompt-actions{display:flex;align-items:center;justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:8px;}
.prompt-hint{font-size:11px;color:var(--text3);}

/* CONTROLS ROW */
.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.ctrl-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;}
.ctrl-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.ctrl-select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:12px;color:var(--text);outline:none;}

/* STYLE CHIPS */
.style-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.style-chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;}
.style-chip:hover{border-color:rgba(0,212,255,0.3);color:var(--accent);}
.style-chip.active{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.4);color:var(--accent);}

/* BUTTONS */
.gen-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius);font-size:14px;font-weight:800;color:#000;cursor:pointer;transition:all .25s;letter-spacing:.5px;margin-bottom:10px;}
.gen-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,255,0.3);}
.gen-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.surprise-btn{width:100%;padding:11px;background:transparent;border:1px solid rgba(123,47,255,0.3);border-radius:10px;font-size:13px;font-weight:600;color:#a855f7;cursor:pointer;transition:all .2s;margin-bottom:20px;}
.surprise-btn:hover{background:rgba(123,47,255,0.08);}

/* RESULTS */
.results-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.results-ttl{font-size:14px;font-weight:700;color:var(--text);}
.img-count-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;background:rgba(0,212,255,0.1);color:var(--accent);}

/* IMAGE GRID */
.img-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.img-card{border-radius:12px;overflow:hidden;background:var(--surface);border:1px solid var(--border);position:relative;aspect-ratio:1;cursor:pointer;}
.img-card.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.img-card.failed{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);}
.img-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.img-card:hover img{transform:scale(1.04);}
.img-overlay{position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,0.8));display:none;gap:6px;justify-content:center;}
.img-card:hover .img-overlay{display:flex;}
.img-act-btn{padding:6px 12px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;}
.img-act-btn.dl{background:var(--accent);color:#000;}
.img-act-btn.save{background:rgba(255,255,255,0.15);color:#fff;backdrop-filter:blur(8px);}
.img-act-btn:hover{transform:scale(1.05);}

/* SPINNER */
.spinner{width:36px;height:36px;border:3px solid rgba(0,212,255,0.15);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:var(--text2);text-align:center;}
.loading-step{font-size:10px;color:var(--text3);margin-top:2px;}

/* SINGLE BIG IMAGE VIEW */
.big-view{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;overflow:hidden;display:none;}
.big-view img{width:100%;display:block;}
.big-actions{display:flex;gap:10px;padding:14px;}
.big-btn{flex:1;padding:11px;border-radius:9px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.big-btn.dl{background:var(--green);color:#000;}
.big-btn.save{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
.big-btn.regen{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
.big-btn:hover{transform:translateY(-1px);}

/* GALLERY */
.gallery-section{margin-top:28px;}
.gallery-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.gallery-ttl{font-size:14px;font-weight:700;color:var(--text);}
.clr-btn{padding:5px 12px;background:none;border:1px solid rgba(255,68,68,0.2);border-radius:6px;font-size:11px;font-weight:600;color:rgba(255,68,68,0.6);cursor:pointer;transition:all .2s;}
.clr-btn:hover{background:rgba(255,68,68,0.07);}
.gallery-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.gal-item{aspect-ratio:1;border-radius:9px;overflow:hidden;cursor:pointer;border:1px solid var(--border);}
.gal-item img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.gal-item:hover img{transform:scale(1.08);}
.gallery-empty{text-align:center;padding:28px;color:var(--text3);font-size:13px;background:var(--surface);border-radius:var(--radius);border:1px dashed var(--border2);}

/* FULLSCREEN */
.fullscreen-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:999;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(20px);}
.fullscreen-overlay.open{display:flex;flex-direction:column;gap:16px;}
.fullscreen-overlay img{max-width:100%;max-height:70vh;border-radius:12px;object-fit:contain;}
.fs-btns{display:flex;gap:10px;}
.fs-btn{padding:11px 22px;border-radius:9px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.fs-btn.dl{background:var(--accent);color:#000;}
.fs-btn.cl{background:rgba(255,255,255,0.1);color:#fff;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:12px 18px;font-size:14px;font-weight:600;color:var(--text);z-index:9999;transition:transform .3s cubic-bezier(.175,.885,.32,1.275);display:flex;align-items:center;gap:9px;box-shadow:0 8px 30px rgba(0,0,0,0.4);pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">QUILEX AI</div>
  <div style="display:flex;gap:8px;">
    <a href="dashboard.html" class="top-btn">← Dashboard</a>
    <a href="index.html" class="top-btn">Home</a>

</div>

<div class="container">
  <div class="hero">
    <div class="hero-title">AI IMAGE STUDIO</div>
    <div class="hero-sub">Free · Unlimited · Powered by Flux AI</div>
  </div>

  <!-- PROMPT -->
  <div class="prompt-box">
    <textarea class="prompt-ta" id="promptTa" placeholder="Describe the image you want... (e.g. 'A majestic lion at golden hour, photorealistic, 4K')" rows="3"></textarea>
    <div class="prompt-actions">

  <div class="style-row" id="styleRow">

    <button class="style-chip" data-style="digital art" onclick="setStyle(this,'digital art')">🎨 Digital Art</button>
    <button class="style-chip" data-style="anime style" onclick="setStyle(this,'anime style')">🌸 Anime</button>
    <button class="style-chip" data-style="oil painting" onclick="setStyle(this,'oil painting')">🖼 Oil Paint</button>
    <button class="style-chip" data-style="3D render" onclick="setStyle(this,'3D render')">💎 3D</button>

  <div id="resultsSection" style="display:none;">

  <!-- GALLERY -->
  <div class="gallery-section">

      <button class="clr-btn" onclick="clearGallery()">Clear All</button>

    <div id="galleryGrid"></div>
  </div>
</div>

<!-- FULLSCREEN -->
<div class="fullscreen-overlay" id="fsOverlay" onclick="closeFull(event)">
  <img id="fsImg" src="" alt="">
  <div class="fs-btns">
    <button class="fs-btn dl" onclick="downloadFull()">⬇ Download</button>
    <button class="fs-btn cl" onclick="closeFull()">✕ Close</button>
  </div>
</div>

<div class="toast" id="toast"><span id="toastIco">✅</span><span id="toastMsg">Done!</span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var sb = supabase.createClient('https://xlekzrwszfbwdyorkrew.supabase.co','sb_publishable_VxoALW6RD0ZaPa54rucdJg_W6OrhNFi');
var currentStyle = '';
var currentUser = null;
var gallery = JSON.parse(localStorage.getItem('qu_gallery')||'[]');
var fullImgUrl = '';

// ── AUTH ──
async function checkAuth() {
  var r = await sb.auth.getSession();
  if(!r.data.session) { window.location.href='quilex-login.html'; return; }
  currentUser = r.data.session.user;
}

// ── STYLE ──
function setStyle(el, style) {
  document.querySelectorAll('.style-chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  currentStyle = style;
}

// ── PROMPT CHAR COUNT ──
document.getElementById('promptTa').addEventListener('input', function(){
  document.getElementById('charCount').textContent = this.value.length+' / 500';
  if(this.value.length>500) this.value=this.value.substring(0,500);
});

function clearPrompt() {
  document.getElementById('promptTa').value='';
  document.getElementById('charCount').textContent='0 / 500';
}

// ── SURPRISE ME ──
var surprises = [
  'A majestic dragon soaring over a neon city at night, digital art, 4K',
  'Portrait of a wise old wizard in a magical library, oil painting style',
  'Futuristic Tokyo street at rain, cinematic, bokeh, 8K photography',
  'A cute astronaut cat floating in space with colorful nebulas',
  'Ancient Greek temple at sunset on a cliff, photorealistic',
  'Underwater city with glowing bioluminescent creatures, concept art',
  'A lone samurai standing in cherry blossom rain, anime style',
  'Steampunk flying ship above clouds at golden hour, detailed illustration',
  'Minimalist mountain landscape with aurora borealis, wallpaper',
  'A mystical forest with glowing mushrooms and fairies, fantasy art',
  'Cyberpunk girl with neon hair in a rain-soaked alley, portrait',
  'Giant whale swimming through clouds above mountains, surreal art',
];
function surpriseMe() {
  var p = surprises[Math.floor(Math.random()*surprises.length)];
  document.getElementById('promptTa').value = p;
  document.getElementById('charCount').textContent = p.length+' / 500';
}

// ── BUILD URL ──
// Multiple Pollinations.ai endpoints for reliability
function buildUrl(prompt, w, h, seed) {
  var fullPrompt = prompt.trim();
  if(currentStyle) fullPrompt += ', ' + currentStyle;
  fullPrompt += ', high quality, detailed';
  var encoded = encodeURIComponent(fullPrompt);
  var s = seed || Math.floor(Math.random()*99999);
  return 'https://image.pollinations.ai/prompt/'+encoded+'?width='+w+'&height='+h+'&seed='+s+'&nologo=true&enhance=false&model=flux';
}

// ── RELIABLE IMAGE LOADER (fetch-based, works on mobile) ──
function loadImg(url, retries) {
  retries = retries === undefined ? 3 : retries;
  return new Promise(function(resolve) {
    var attempt = 0;
    function tryIt() {
      attempt++;
      // Use fetch with timeout for reliability
      var controller = new AbortController();
      var timer = setTimeout(function(){ controller.abort(); }, 20000);
      fetch(url, {signal: controller.signal})
        .then(function(res) {
          clearTimeout(timer);
          if(!res.ok) throw new Error('HTTP '+res.status);
          return res.blob();
        })
        .then(function(blob) {
          var objUrl = URL.createObjectURL(blob);
          resolve({ok:true, url:url, blobUrl:objUrl});
        })
        .catch(function(err) {
          clearTimeout(timer);
          if(attempt < retries) {
            // New seed on retry
            var newUrl = url.replace(/seed=\d+/, 'seed='+Math.floor(Math.random()*99999));
            url = newUrl + '&t='+Date.now();
            setTimeout(tryIt, 2000);
          } else {
            resolve({ok:false, error: err.message});
          }
        });
    }
    tryIt();
  });
}

// ── GENERATE ──
async function generateImages() {
  var prompt = document.getElementById('promptTa').value.trim();
  if(!prompt) { showToast('⚠️','Enter a prompt first!'); return; }

  var sizeVal = document.getElementById('sizeSelect').value;
  var parts = sizeVal.split('x');
  var w = parseInt(parts[0]);
  var h = parseInt(parts[1]);
  var count = parseInt(document.getElementById('countSelect').value);

  var btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  // Show results section with loading cards
  var section = document.getElementById('resultsSection');
  var grid = document.getElementById('imgGrid');
  section.style.display = 'block';
  grid.innerHTML = '';

  // Set grid columns based on count
  grid.style.gridTemplateColumns = count === 1 ? '1fr' : '1fr 1fr';

  // Create loading placeholders
  var cards = [];
  for(var i=0; i<count; i++) {
    var card = document.createElement('div');
    card.className = 'img-card loading';
    var steps = ['Sending prompt...','Building your image...','Adding details...','Almost done...'];
    var stepIdx = 0;
    var stepTimer = setInterval(function(){ 
      if(!card.querySelector('.loading-step')) { clearInterval(stepTimer); return; }
      card.querySelector('.loading-step').textContent = steps[Math.min(stepIdx++, steps.length-1)];
    }, 3000);
    card.innerHTML = '<div class="spinner"></div><div class="loading-txt">Generating...<br><span class="loading-step">Sending prompt...</span></div>';
    grid.appendChild(card);
    cards.push(card);
  }

  document.getElementById('imgCountBadge').textContent = count+' image'+(count>1?'s':'');
  section.scrollIntoView({behavior:'smooth', block:'start'});

  // Generate all in parallel
  var promises = [];
  for(var j=0; j<count; j++) {
    var seed = Math.floor(Math.random()*99999) + j*1000;
    var url = buildUrl(prompt, w, h, seed);
    promises.push(loadImg(url, 3));
  }

  var results = await Promise.all(promises);
  var successCount = 0;

  results.forEach(function(result, idx) {
    var card = cards[idx];
    card.className = 'img-card';
    card.innerHTML = '';
    if(result.ok) {
      successCount++;
      var img = document.createElement('img');
      img.src = result.blobUrl || result.url;
      img.alt = prompt;
      img.onclick = function(){ openFull(result.blobUrl || result.url); };
      var overlay = document.createElement('div');
      overlay.className = 'img-overlay';
      var dlBtn = document.createElement('button');
      dlBtn.className = 'img-act-btn dl';
      dlBtn.textContent = 'Download';
      dlBtn.onclick = function(e){ e.stopPropagation(); downloadImage(result.blobUrl||result.url, prompt); };
      var saveBtn = document.createElement('button');
      saveBtn.className = 'img-act-btn save';
      saveBtn.textContent = 'Save';
      saveBtn.onclick = function(e){ e.stopPropagation(); saveToGallery(result.blobUrl||result.url, prompt); };
      overlay.appendChild(dlBtn);
      overlay.appendChild(saveBtn);
      card.appendChild(img);
      card.appendChild(overlay);
    } else {
      card.className = 'img-card failed';
      card.innerHTML = '<span style="font-size:28px;">⚠️</span><span style="font-size:12px;color:var(--text3);">Failed to generate</span><button onclick="regenSingle(this,\''+prompt+'\','+w+','+h+')" style="margin-top:6px;padding:6px 14px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);border-radius:6px;font-size:11px;font-weight:600;color:var(--accent);cursor:pointer;">Retry</button>';
    }
  });

  btn.disabled = false;
  btn.textContent = '✨ Generate Images';

  if(successCount > 0) {
    showToast('🎨', successCount+' image'+(successCount>1?'s':'')+' generated!');
    trackGeneration();
  } else {
    showToast('⚠️','Generation failed. Check your internet and try again.');
  }
}

// ── RETRY SINGLE ──
async function regenSingle(btn, prompt, w, h) {
  var card = btn.closest('.img-card');
  card.className = 'img-card loading';
  card.innerHTML = '<div class="spinner"></div><div class="loading-txt">Retrying...</div>';
  var seed = Math.floor(Math.random()*99999);
  var url = buildUrl(prompt, w, h, seed);
  var result = await loadImg(url, 3);
  if(result.ok) {
    card.className = 'img-card';
    card.innerHTML = '';
    var img = document.createElement('img');
    img.src = result.url;
    img.onclick = function(){ openFull(result.url); };
    card.appendChild(img);
    showToast('✅','Image generated!');
  } else {
    card.className = 'img-card failed';
    card.innerHTML = '<span style="font-size:28px;">⚠️</span><span style="font-size:12px;color:var(--text3);">Failed again</span>';
    showToast('⚠️','Still failing. Pollinations.ai may be busy.');
  }
}

// ── DOWNLOAD ──
function downloadImage(url, prompt) {
  var a = document.createElement('a');
  a.href = url;
  a.download = 'quilex-ai-'+Date.now()+'.jpg';
  a.target = '_blank';
  a.click();
  showToast('⬇️','Downloading...');
}

// ── GALLERY ──
function saveToGallery(url, prompt) {
  gallery.unshift({url:url, prompt:prompt, time:Date.now()});
  if(gallery.length > 50) gallery = gallery.slice(0,50);
  localStorage.setItem('qu_gallery', JSON.stringify(gallery));
  renderGallery();
  showToast('🖼','Saved to gallery!');
}

function renderGallery() {
  var el = document.getElementById('galleryGrid');
  if(!gallery.length) {
    el.innerHTML = '<div class="gallery-empty">No saved images yet.<br>Generate and save images to see them here!</div>';
    return;
  }
  el.className = 'gallery-grid';
  el.innerHTML = '';
  gallery.forEach(function(item, i) {
    var div = document.createElement('div');
    div.className = 'gal-item';
    div.title = item.prompt||'';
    var img = document.createElement('img');
    img.src = item.url;
    img.onerror = function(){ div.style.display='none'; };
    img.onclick = function(){ openFull(item.url); };
    div.appendChild(img);
    el.appendChild(div);
  });
}

function clearGallery() {
  if(!confirm('Clear all saved images?')) return;
  gallery = [];
  localStorage.setItem('qu_gallery','[]');
  renderGallery();
  showToast('🗑','Gallery cleared');
}

// ── FULLSCREEN ──
function openFull(url) {
  fullImgUrl = url;
  document.getElementById('fsImg').src = url;
  document.getElementById('fsOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeFull(e) {
  if(e && e.target !== document.getElementById('fsOverlay') && !e.target.classList.contains('fs-btn')) return;
  document.getElementById('fsOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function downloadFull() {
  downloadImage(fullImgUrl, 'quilex-image');
}

// ── TRACK TO SUPABASE ──
async function trackGeneration() {
  if(!currentUser) return;
  try {
    await sb.from('profiles').update({images_generated: sb.rpc ? undefined : 1}).eq('id', currentUser.id);
  } catch(e) {}
}

// ── TOAST ──
var toastT;
function showToast(ico, msg) {
  var t = document.getElementById('toast');
  document.getElementById('toastIco').textContent = ico;
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

// ── INIT ──
checkAuth();
renderGallery();
</script>
