<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>QUILEX AI — Image Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070f;--s1:#0f0f1e;--s2:#14142a;--hover:#1a1a32;
  --a:#00d4ff;--a2:#7c3aed;--pink:#f43f5e;--green:#10b981;--gold:#f59e0b;
  --t:#f1f5f9;--t2:#94a3b8;--t3:#334155;
  --bd:rgba(255,255,255,0.05);--bd2:rgba(255,255,255,0.1);
  --glow:0 0 30px rgba(0,212,255,0.15);
  --r:16px;
}
html{font-size:15px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(7,7,15,0.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--bd2)}
.logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-btns{display:flex;gap:8px}
.nav-btn{height:36px;padding:0 14px;border-radius:10px;border:1px solid var(--bd2);background:rgba(255,255,255,0.03);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center}
.nav-btn:hover{background:var(--hover);color:var(--t);border-color:rgba(0,212,255,0.25)}

/* HERO */
.hero{text-align:center;padding:32px 20px 24px}
.hero-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:20px;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.2);color:var(--a);margin-bottom:14px}
.hero-title{font-family:'Orbitron',monospace;font-size:clamp(22px,6vw,34px);font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,#fff 0%,var(--a) 50%,var(--a2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:10px}
.hero-sub{font-size:14px;color:var(--t2);line-height:1.6}

/* PROMPT AREA */
.prompt-wrap{max-width:600px;margin:0 auto;padding:0 16px 20px}
.prompt-box{background:var(--s1);border:1.5px solid var(--bd2);border-radius:var(--r);overflow:hidden;transition:all .3s;margin-bottom:14px}
.prompt-box:focus-within{border-color:rgba(0,212,255,0.4);box-shadow:var(--glow)}
.prompt-inner{display:flex;align-items:flex-start;gap:0}
.prompt-icon{padding:16px 4px 16px 16px;font-size:20px;flex-shrink:0;opacity:.6}
.prompt-ta{flex:1;padding:14px 16px;background:transparent;border:none;outline:none;font-size:15px;color:var(--t);line-height:1.6;resize:none;min-height:90px;font-family:'Inter',sans-serif}
.prompt-ta::placeholder{color:var(--t3)}
.prompt-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--bd);background:rgba(255,255,255,0.01)}
.char-ct{font-size:11px;color:var(--t3);font-weight:500}
.prompt-actions{display:flex;gap:6px}
.p-act{padding:6px 12px;border-radius:8px;border:1px solid var(--bd2);background:transparent;font-size:11px;font-weight:600;color:var(--t3);cursor:pointer;transition:all .2s}
.p-act:hover{background:var(--hover);color:var(--t2);border-color:var(--bd2)}

/* STYLE CHIPS */
.style-section{margin-bottom:16px}
.section-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.chips-row{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:20px;border:1px solid var(--bd2);background:transparent;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .2s;user-select:none}
.chip:hover{border-color:rgba(0,212,255,0.3);color:var(--t)}
.chip.active{background:linear-gradient(135deg,rgba(0,212,255,0.12),rgba(124,58,237,0.12));border-color:rgba(0,212,255,0.45);color:var(--a);box-shadow:0 0 12px rgba(0,212,255,0.1)}

/* CONTROLS */
.controls-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.ctrl{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px}
.ctrl-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:8px}
.ctrl-select{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--t);outline:none;font-family:'Inter',sans-serif;cursor:pointer}
.ctrl-select:focus{border-color:rgba(0,212,255,0.35)}

/* BUTTONS */
.gen-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--a),var(--a2));border:none;border-radius:var(--r);font-size:15px;font-weight:800;color:#000;cursor:pointer;transition:all .3s;letter-spacing:.5px;position:relative;overflow:hidden;margin-bottom:10px}
.gen-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transition:left .5s}
.gen-btn:hover::before{left:100%}
.gen-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,212,255,0.35)}
.gen-btn:active{transform:scale(.98)}
.gen-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.surprise-btn{width:100%;padding:12px;background:rgba(124,58,237,0.06);border:1px solid rgba(124,58,237,0.2);border-radius:var(--r);font-size:13px;font-weight:700;color:#a78bfa;cursor:pointer;transition:all .2s;margin-bottom:24px}
.surprise-btn:hover{background:rgba(124,58,237,0.12);border-color:rgba(124,58,237,0.35)}

/* RESULTS */
.results-section{max-width:600px;margin:0 auto;padding:0 16px}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.results-title{font-size:16px;font-weight:800;color:var(--t)}
.count-badge{padding:4px 10px;border-radius:6px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);font-size:11px;font-weight:700;color:var(--a)}

/* STATUS BAR */
.status-bar{display:none;align-items:center;gap:10px;padding:12px 16px;background:var(--s1);border:1px solid var(--bd2);border-radius:12px;margin-bottom:14px}
.status-bar.show{display:flex}
.status-spinner{width:18px;height:18px;border:2.5px solid rgba(0,212,255,0.15);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.status-text{font-size:13px;color:var(--t2);flex:1}
.status-cancel{font-size:11px;font-weight:700;color:var(--pink);background:none;border:none;cursor:pointer;padding:4px 8px}

/* IMAGE GRID */
.img-grid{display:grid;gap:12px;margin-bottom:24px}
.img-grid.count-1{grid-template-columns:1fr}
.img-grid.count-2{grid-template-columns:1fr 1fr}
.img-grid.count-4{grid-template-columns:1fr 1fr}

.img-card{border-radius:14px;overflow:hidden;background:var(--s1);border:1px solid var(--bd);position:relative;transition:all .3s}
.img-card.count-1{aspect-ratio:4/3}
.img-card.count-2,.img-card.count-4{aspect-ratio:1}
.img-card:hover{border-color:rgba(0,212,255,0.25);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}

/* Loading state */
.img-card .card-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--s1)}
.load-pulse{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.9)}50%{opacity:1;transform:scale(1)}}
.load-text{font-size:12px;color:var(--t2);text-align:center;line-height:1.5}
.load-step{font-size:11px;color:var(--t3);margin-top:2px}

/* Success state */
.img-card img{width:100%;height:100%;object-fit:cover;display:block}
.img-card .card-overlay{position:absolute;bottom:0;left:0;right:0;padding:12px;background:linear-gradient(transparent,rgba(0,0,0,0.85));display:flex;gap:8px;opacity:0;transition:opacity .25s}
.img-card:hover .card-overlay{opacity:1}
.ov-btn{flex:1;padding:9px;border-radius:9px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.ov-btn.dl{background:var(--a);color:#000}
.ov-btn.save{background:rgba(255,255,255,0.15);color:#fff;backdrop-filter:blur(8px)}
.ov-btn:hover{transform:scale(1.04)}

/* Failed state */
.img-card .card-failed{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--s1)}
.fail-icon{font-size:36px;opacity:.5}
.fail-text{font-size:12px;color:var(--t3);text-align:center}
.retry-btn{padding:8px 18px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);border-radius:8px;font-size:12px;font-weight:700;color:var(--a);cursor:pointer;transition:all .2s}
.retry-btn:hover{background:rgba(0,212,255,0.15)}

/* GALLERY */
.gallery-section{max-width:600px;margin:0 auto;padding:0 16px 100px}
.gal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.gal-title{font-size:16px;font-weight:800;color:var(--t)}
.gal-clear{padding:7px 14px;background:rgba(244,63,94,0.05);border:1px solid rgba(244,63,94,0.15);border-radius:8px;font-size:12px;font-weight:600;color:rgba(244,63,94,0.7);cursor:pointer;transition:all .2s}
.gal-clear:hover{background:rgba(244,63,94,0.1)}
.gal-empty{padding:32px;text-align:center;color:var(--t3);font-size:13px;background:var(--s1);border-radius:var(--r);border:1px dashed var(--bd2);line-height:1.7}
.gal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.gal-item{aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid var(--bd);transition:all .25s;background:var(--s1)}
.gal-item:hover{border-color:rgba(0,212,255,0.25);transform:scale(1.03)}
.gal-item img{width:100%;height:100%;object-fit:cover}

/* FULLSCREEN */
.fs-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.96);backdrop-filter:blur(20px);flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}
.fs-overlay.open{display:flex}
.fs-img-wrap{max-width:100%;max-height:72vh;border-radius:16px;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,0.8)}
.fs-img-wrap img{display:block;max-width:100%;max-height:72vh;object-fit:contain}
.fs-btns{display:flex;gap:10px}
.fs-btn{height:44px;padding:0 22px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.fs-btn.dl{background:var(--a);color:#000}
.fs-btn.cl{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.15)}
.fs-btn:hover{transform:scale(1.04)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);opacity:0;background:var(--s2);border:1px solid var(--bd2);border-radius:14px;padding:12px 20px;font-size:13px;font-weight:600;color:var(--t);z-index:9999;transition:all .35s cubic-bezier(.175,.885,.32,1.275);display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,0.5);pointer-events:none;white-space:nowrap;max-width:calc(100vw - 32px)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">QUILEX AI</div>
  <div class="nav-btns">
    <a href="dashboard.html" class="nav-btn">← Dashboard</a>

      <button class="chip" onclick="setStyle(this,'cinematic, dramatic lighting')">🎬 Cinematic</button>

  <!-- CONTROLS -->
  <div class="controls-grid">

        <option value="512x512">512 × 512 Square</option>

<!-- STATUS -->

<!-- GALLERY -->

  </div>
</div>

<script>
var sb = supabase.createClient('https://xlekzrwszfbwdyorkrew.supabase.co','sb_publishable_VxoALW6RD0ZaPa54rucdJg_W6OrhNFi');
var currentUser = null;
var activeStyle = '';
var gallery = JSON.parse(localStorage.getItem('qu_gallery')||'[]');
var fullUrl = '';
var genCancelled = false;
var toastTimer;

// ── AUTH ──
async function checkAuth() {
  var r = await sb.auth.getSession();
  if(!r.data || !r.data.session) { window.location.href='quilex-login.html'; return; }
  currentUser = r.data.session.user;
}

// ── STYLE ──
function setStyle(el, style) {
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  activeStyle = style;
}

// ── CHAR COUNT ──
document.getElementById('promptTa').addEventListener('input', function(){
  document.getElementById('charCt').textContent = this.value.length + ' / 500';
});

function clearPrompt() {
  document.getElementById('promptTa').value = '';
  document.getElementById('charCt').textContent = '0 / 500';
  document.getElementById('promptTa').focus();
}

// ── SURPRISE ──
var surprises = [
  'A majestic dragon soaring over a neon-lit city at midnight, digital art, ultra-detailed',
  'Portrait of a wise old wizard in an ancient magical library, warm lighting, oil painting',
  'Futuristic Tokyo street in the rain, cinematic photography, bokeh, 8K HDR',
  'A cute astronaut cat floating through space surrounded by colorful nebulas',
  'Ancient Greek temple perched on a cliff at golden hour, photorealistic',
  'Underwater civilization with bioluminescent creatures and glowing coral, concept art',
  'A lone samurai in cherry blossom rain, anime style, dramatic lighting',
  'Giant steampunk flying ship above clouds, detailed illustration, warm sunset',
  'Minimalist mountain landscape with aurora borealis, wallpaper style',
  'Mystical forest with glowing mushrooms and tiny fairies, fantasy art',
  'Cyberpunk girl with neon hair standing in a rain-soaked alley at night, portrait',
  'Giant whale swimming through clouds above mountain peaks, surreal art'
];
function surprise() {
  var p = surprises[Math.floor(Math.random()*surprises.length)];
  document.getElementById('promptTa').value = p;
  document.getElementById('charCt').textContent = p.length + ' / 500';
  toast('🎲','Random prompt loaded — hit Generate!');
}

// ── BUILD URL ──
function buildUrl(prompt, w, h, seed, modelOverride) {
  var full = prompt.trim();
  if(activeStyle) full += ', ' + activeStyle;
  full += ', masterpiece, ultra detailed, sharp focus, 8k';
  var seed_n = seed !== undefined ? seed : Math.floor(Math.random()*99999);
  var model = modelOverride || 'flux';
  return 'https://image.pollinations.ai/prompt/'
    + encodeURIComponent(full)
    + '?width=' + w
    + '&height=' + h
    + '&seed=' + seed_n
    + '&nologo=true'
    + '&model=' + model
    + '&nofeed=true';
}

// IMG_MODELS fallback order — flux first (most reliable)
var IMG_MODELS = ['flux', 'flux-schnell', 'turbo', 'flux-realism', 'flux-3d'];

// Multiple model fallbacks — tries each until one works


// ── LOAD IMAGE WITH IMG TAG (correct approach, no fetch/blob) ──
function loadImage(url, timeoutMs) {
  timeoutMs = timeoutMs || 35000;
  return new Promise(function(resolve) {
    var img = new Image();
    img.crossOrigin = 'anonymous';
    var t = setTimeout(function(){
      img.src = '';
      resolve({ok:false, reason:'timeout'});
    }, timeoutMs);
    img.onload = function(){
      clearTimeout(t);
      resolve({ok:true, img:img, url:url});
    };
    img.onerror = function(){
      clearTimeout(t);
      resolve({ok:false, reason:'error'});
    };
    img.src = url + '&_t=' + Date.now();
  });
}

// ── GENERATE ──
var statusSteps = [
  'Connecting to image AI...',
  'Generating image details...',
  'Painting textures and colors...',
  'Adding final touches...',
  'Almost ready...'
];

async function generate() {
  var prompt = document.getElementById('promptTa').value.trim();
  if(!prompt) { toast('⚠️','Please write a prompt first!'); document.getElementById('promptTa').focus(); return; }

  var size = document.getElementById('sizeSelect').value.split('x');
  var w = parseInt(size[0]), h = parseInt(size[1]);
  var count = parseInt(document.getElementById('countSelect').value);
  genCancelled = false;

  // UI: loading state
  var genBtn = document.getElementById('genBtn');
  genBtn.disabled = true; genBtn.textContent = 'Generating...';
  document.getElementById('statusBar').classList.add('show');
  document.getElementById('statusText').textContent = statusSteps[0];

  // Animate status steps
  var stepIdx = 0;
  var stepTimer = setInterval(function(){
    if(genCancelled) { clearInterval(stepTimer); return; }
    stepIdx = Math.min(stepIdx+1, statusSteps.length-1);
    document.getElementById('statusText').textContent = statusSteps[stepIdx];
  }, 4000);

  // Build grid
  var grid = document.getElementById('imgGrid');
  var wrap = document.getElementById('resultsWrap');
  grid.className = 'img-grid count-'+count;
  grid.innerHTML = '';
  wrap.style.display = 'block';
  document.getElementById('countBadge').textContent = count + ' image'+(count>1?'s':'');

  // Create placeholder cards
  var cards = [];
  for(var i=0; i<count; i++) {
    var card = document.createElement('div');
    card.className = 'img-card count-'+count;
    card.innerHTML = '<div class="card-loading"><div class="load-pulse"></div><div class="load-text">Generating<br><span class="load-step" id="lstep'+i+'">Image '+(i+1)+' of '+count+'</span></div></div>';
    grid.appendChild(card);
    cards.push(card);
  }

  // Scroll to results
  setTimeout(function(){ wrap.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 200);

  // Generate each image
  var success = 0;
  var promises = [];
  for(var j=0; j<count; j++) {
    promises.push(generateSingle(prompt, w, h, j, cards[j], count));
  }
  var results = await Promise.all(promises);
  results.forEach(function(ok){ if(ok) success++; });

  clearInterval(stepTimer);
  genBtn.disabled = false; genBtn.textContent = '✨ Generate Images';
  document.getElementById('statusBar').classList.remove('show');

  if(!genCancelled) {
    if(success > 0) toast('🎨', success+' image'+(success>1?'s':'')+' created!');
    else toast('⚠️','Generation failed — Pollinations.ai may be busy. Try again!');
  }
}

async function generateSingle(prompt, w, h, index, card, count) {
  if(genCancelled) return false;
  var seed = Math.floor(Math.random()*99999) + index*3333;

  for(var attempt=0; attempt<IMG_MODELS.length; attempt++) {
    if(genCancelled) return false;

    var lstep = document.getElementById('lstep'+index);
    if(lstep) lstep.textContent = attempt > 0 ? 'Trying model '+(attempt+1)+'...' : 'Building image...';

    var url = buildUrl(prompt, w, h, seed + attempt*100, IMG_MODELS[attempt]);
    var result = await loadImage(url, 50000);

    if(result.ok) {
      // Success! Build card
      card.innerHTML = '';
      var img = document.createElement('img');
      img.src = result.url;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
      img.onclick = function(u){ return function(){ openFull(u); }; }(result.url);

      var overlay = document.createElement('div');
      overlay.className = 'card-overlay';

      var dlBtn = document.createElement('button');
      dlBtn.className = 'ov-btn dl';
      dlBtn.textContent = '⬇ Download';
      dlBtn.onclick = function(u,p){ return function(e){ e.stopPropagation(); dlImg(u,p); }; }(result.url, prompt);

      var saveBtn = document.createElement('button');
      saveBtn.className = 'ov-btn save';
      saveBtn.textContent = '🖼 Save';
      saveBtn.onclick = function(u,p){ return function(e){ e.stopPropagation(); saveGallery(u,p); }; }(result.url, prompt);

      overlay.appendChild(dlBtn);
      overlay.appendChild(saveBtn);
      card.appendChild(img);
      card.appendChild(overlay);
      return true;
    }
  }

  // All retries failed
  card.innerHTML = '<div class="card-failed"><div class="fail-icon">⚡</div><div class="fail-text">Generation failed.<br>Pollinations may be busy.</div><button class="retry-btn" onclick="retryCard(this,\''+encodeURIComponent(prompt)+'\','+w+','+h+','+count+')">Retry</button></div>';
  return false;
}

async function retryCard(btn, encodedPrompt, w, h, count) {
  var prompt = decodeURIComponent(encodedPrompt);
  var card = btn.closest('.img-card');
  card.innerHTML = '<div class="card-loading"><div class="load-pulse"></div><div class="load-text">Retrying...<br><span class="load-step">New attempt</span></div></div>';
  var ok = await generateSingle(prompt, w, h, 0, card, count);
  if(!ok) toast('⚠️','Still failing — try a different prompt or wait a moment');
  else toast('✅','Image generated!');
}

function cancelGen() {
  genCancelled = true;
  document.getElementById('statusBar').classList.remove('show');
  var genBtn = document.getElementById('genBtn');
  genBtn.disabled = false; genBtn.textContent = '✨ Generate Images';
  toast('ℹ️','Generation cancelled');
}

// ── DOWNLOAD ──
function dlImg(url, prompt) {
  var a = document.createElement('a');
  a.href = url;
  a.download = 'quilex-'+Date.now()+'.jpg';
  a.target = '_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast('⬇️','Downloading image...');
}

// ── GALLERY ──
function saveGallery(url, prompt) {
  gallery.unshift({url:url, prompt:prompt, time:Date.now()});
  if(gallery.length>50) gallery=gallery.slice(0,50);
  localStorage.setItem('qu_gallery', JSON.stringify(gallery));
  renderGallery();
  toast('🖼','Saved to gallery!');
}

function renderGallery() {
  var wrap = document.getElementById('galWrap');
  if(!gallery.length) {
    wrap.className = '';
    wrap.innerHTML = '<div class="gal-empty">No saved images yet.<br>Generate images and tap <strong>Save</strong> to keep them here!</div>';
    return;
  }
  wrap.className = 'gal-grid';
  wrap.innerHTML = '';
  gallery.forEach(function(item) {
    var div = document.createElement('div');
    div.className = 'gal-item';
    div.title = item.prompt||'';
    var img = document.createElement('img');
    img.src = item.url;
    img.loading = 'lazy';
    img.onerror = function(){ div.style.display='none'; };
    div.onclick = function(){ openFull(item.url); };
    div.appendChild(img);
    wrap.appendChild(div);
  });
}

function clearGallery() {
  if(!confirm('Clear all saved images from your gallery?')) return;
  gallery = [];
  localStorage.removeItem('qu_gallery');
  renderGallery();
  toast('🗑','Gallery cleared');
}

// ── FULLSCREEN ──
function openFull(url) {
  fullUrl = url;
  var overlay = document.getElementById('fsOverlay');
  document.getElementById('fsImg').src = url;
  document.getElementById('fsDlBtn').onclick = function(){ dlImg(url,'quilex-image'); };
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeFull() {
  document.getElementById('fsOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('fsOverlay').addEventListener('click', function(e){
  if(e.target === this) closeFull();
});

// ── TOAST ──
function toast(ico, msg) {
  clearTimeout(toastTimer);
  document.getElementById('tIco').textContent = ico;
  document.getElementById('tMsg').textContent = msg;
  var t = document.getElementById('toast');
  t.classList.add('show');
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

// ── INIT ──
checkAuth();
renderGallery();
</script>
