<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUILEX AI</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00d4ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QUILEX AI">
<link rel="apple-touch-icon" href="/logo-192.png">

<style>
body{margin:0;background:#020408;color:#e8f4f8;font-family:Arial,sans-serif}
.app-section{padding:60px 16px;display:flex;justify-content:center}
.phone-mockup{width:min(240px,70vw);min-height:420px;border:2px solid rgba(0,212,255,.3);border-radius:32px;background:rgba(0,212,255,.03);display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:0 0 60px rgba(0,212,255,.1);padding:12px 0}
.phone-logo{font-weight:bold;color:#00d4ff}
.phone-items{display:flex;flex-direction:column;gap:6px;width:85%;max-height:320px;overflow-y:auto}
.phone-items::-webkit-scrollbar{width:4px}
.phone-items::-webkit-scrollbar-thumb{background:rgba(0,212,255,.4);border-radius:10px}
.phone-item{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.1);border-radius:4px;padding:6px 10px;font-size:11px}
@media(max-width:480px){.phone-mockup{width:82vw}.phone-items{max-height:300px}}
</style>
</head>
<body>

<section class="app-section">
  <div class="phone-mockup">
    <div class="phone-logo">QUILEX AI</div>
    <div class="phone-items">
      <div class="phone-item">📱 Build My App</div>
      <div class="phone-item">🎬 Generate Video</div>
      <div class="phone-item">🤖 AI Agents</div>
      <div class="phone-item">🧠 Chat with AI</div>
      <div class="phone-item">🎨 Create Image</div>
      <div class="phone-item">💻 Write Code</div>
      <div class="phone-item">🎵 Make Music</div>
      <div class="phone-item">💊 Health AI</div>
      <div class="phone-item">💰 Finance AI</div>
      <div class="phone-item">🛍️ Marketplace</div>
    </div>
  </div>
</section>

<button id="installBtn" style="display:none;position:fixed;bottom:20px;right:20px">Install</button>

<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBtn').style.display='block'});
document.getElementById('installBtn').onclick=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt=null};
</script>

</body>
</html>
